name: Build Csharp SDK

on:
  workflow_dispatch:
  repository_dispatch:
    types: [trigger-build]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          path: selling-partner-api-sdk-jc-csharp
      - uses: actions/checkout@v4
        with:
          repository: amzn/selling-partner-api-models
          path: selling-partner-api-models
      - name: Install .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '7.0.x'
    #   - uses: actions/cache@v3
    #     with:
    #       path: ~/.nuget/packages
    #       key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
    #       restore-keys: |
    #         ${{ runner.os }}-nuget-
      - name: Download openapi codegen
        working-directory: ./selling-partner-api-sdk-jc-csharp/csharp
        run: curl -O https://repo1.maven.org/maven2/org/openapitools/openapi-generator-cli/7.9.0/openapi-generator-cli-7.9.0.jar
      - name: Remove old sdk files
        working-directory: ./selling-partner-api-sdk-jc-csharp/csharp/sdk
        run: rm -r *
      # - name: Copy Auth&Auth lib
      #   run: cp selling-partner-api-models/clients/sellingpartner-api-aa-csharp/src/Amazon.SellingPartnerAPIAA/* selling-partner-api-sdk-jc-csha/csharp sdk/SellingPartnerAPIAA
      - name: Execute openapi codegen
        working-directory: ./selling-partner-api-sdk-jc-csharp/csharp
        run: |
          java -jar openapi-generator-cli-7.9.0.jar generate -i ../../selling-partner-api-models/models/amazon-warehousing-and-distribution-model/awd_2024-05-09.json -g csharp -t config/templates -o sdk -c config/config.json --additional-properties=modelPackage=Mode/aw/v2024_05_09,apiPackage=Ap/aw/v2024_05_09 && \
          java -jar openapi-generator-cli-7.9.0.jar generate -i ../../selling-partner-api-models/models/aplus-content-api-model/aplusContent_2020-11-01.json -g csharp -t config/templates -o sdk -c config/config.json --additional-properties=modelPackage=Mode/aplusConten/v2020_11_01,apiPackage=Ap/aplusConten/v2020_11_01 && \
          java -jar openapi-generator-cli-7.9.0.jar generate -i ../../selling-partner-api-models/models/application-integrations-api-model/appIntegrations-2024-04-01.json -g csharp -t config/templates -o sdk -c config/config.json --additional-properties=modelPackage=Mode/appIntegration/v2024_04_01,apiPackage=Ap/appIntegration/v2024_04_01 && \
          java -jar openapi-generator-cli-7.9.0.jar generate -i ../../selling-partner-api-models/models/application-management-api-model/application_2023-11-30.json -g csharp -t config/templates -o sdk -c config/config.json --additional-properties=modelPackage=Mode/application/v2023_11_30,apiPackage=Ap/application/v2023_11_30 && \
          java -jar openapi-generator-cli-7.9.0.jar generate -i ../../selling-partner-api-models/models/catalog-items-api-model/catalogItems_2022-04-01.json -g csharp -t config/templates -o sdk -c config/config.json --additional-properties=modelPackage=Mode/catalogItem/v2022_04_01,apiPackage=Ap/catalogItem/v2022_04_01 && \
          java -jar openapi-generator-cli-7.9.0.jar generate -i ../../selling-partner-api-models/models/data-kiosk-api-model/dataKiosk_2023-11-15.json -g csharp -t config/templates -o sdk -c config/config.json --additional-properties=modelPackage=Mode/datakios/v2023_11_15,apiPackage=Ap/datakios/v2023_11_15 && \
          java -jar openapi-generator-cli-7.9.0.jar generate -i ../../selling-partner-api-models/models/easy-ship-model/easyShip_2022-03-23.json -g csharp -t config/templates -o sdk -c config/config.json --additional-properties=modelPackage=Mode/easyshi/v2022_03_23,apiPackage=Ap/easyshi/v2022_03_23 && \
          java -jar openapi-generator-cli-7.9.0.jar generate -i ../../selling-partner-api-models/models/fba-inbound-eligibility-api-model/fbaInbound.json -g csharp -t config/templates -o sdk -c config/config.json --additional-properties=modelPackage=Mode/fb/eligibilit/v1,apiPackage=Ap/fb/eligibilit/v1 && \
          java -jar openapi-generator-cli-7.9.0.jar generate -i ../../selling-partner-api-models/models/fba-inventory-api-model/fbaInventory.json -g csharp -t config/templates -o sdk -c config/config.json --additional-properties=modelPackage=Mode/fb/inventor/v1,apiPackage=Ap/fb/inventor/v1 && \
          java -jar openapi-generator-cli-7.9.0.jar generate -i ../../selling-partner-api-models/models/feeds-api-model/feeds_2021-06-30.json -g csharp -t config/templates -o sdk -c config/config.json --additional-properties=modelPackage=Mode/feed/v2021_06_30,apiPackage=Ap/feed/v2021_06_30 && \
          java -jar openapi-generator-cli-7.9.0.jar generate -i ../../selling-partner-api-models/models/finances-api-model/financesV0.json -g csharp -t config/templates -o sdk -c config/config.json --additional-properties=modelPackage=Mode/finance/v0,apiPackage=Ap/finance/v0 && \
          java -jar openapi-generator-cli-7.9.0.jar generate -i ../../selling-partner-api-models/models/finances-api-model/transfers_2024-06-01.json -g csharp -t config/templates -o sdk -c config/config.json --additional-properties=modelPackage=Mode/transfer/v2024_06_01,apiPackage=Ap/transfer/v2024_06_01 && \
          # Swagger model contains wrong response body mapping
          # java -jar openapi-generator-cli-7.9.0.jar generate -i ../../selling-partner-api-models/models/finances-api-model/finances_2024-06-19.json -g csharp -t config/templates -o sdk -c config/config.json --additional-properties=modelPackage=Mode/finance/v2024_06_19,apiPackage=Ap/finance/v2024_06_19 && \
          java -jar openapi-generator-cli-7.9.0.jar generate -i ../../selling-partner-api-models/models/fulfillment-inbound-api-model/fulfillmentInboundV0.json -g csharp -t config/templates -o sdk -c config/config.json --additional-properties=modelPackage=Mode/fulfillmen/inboun/v0,apiPackage=Ap/fulfillmen/inboun/v0 && \
          java -jar openapi-generator-cli-7.9.0.jar generate -i ../../selling-partner-api-models/models/fulfillment-inbound-api-model/fulfillmentInbound_2024-03-20.json -g csharp -t config/templates -o sdk -c config/config.json --additional-properties=modelPackage=Mode/fulfillmen/inboun/v2024_03_20,apiPackage=Ap/fulfillmen/inboun/v2024_03_20 && \
          java -jar openapi-generator-cli-7.9.0.jar generate -i ../../selling-partner-api-models/models/fulfillment-outbound-api-model/fulfillmentOutbound_2020-07-01.json -g csharp -t config/templates -o sdk -c config/config.json --additional-properties=modelPackage=Mode/fulfillmen/outboun/v2020_07_01,apiPackage=Ap/fulfillmen/outboun/v2020_07_01 && \
          java -jar openapi-generator-cli-7.9.0.jar generate -i ../../selling-partner-api-models/models/invoices-api-model/InvoicesApiModel_2024-06-19.json -g csharp -t config/templates -o sdk -c config/config.json --additional-properties=modelPackage=Mode/invoice/v2024_06_19,apiPackage=Ap/invoice/v2024_06_19 && \
          java -jar openapi-generator-cli-7.9.0.jar generate -i ../../selling-partner-api-models/models/listings-items-api-model/listingsItems_2021-08-01.json -g csharp -t config/templates -o sdk -c config/config.json --additional-properties=modelPackage=Mode/listing/item/v2021_08_01,apiPackage=Ap/listing/item/v2021_08_01 && \
          java -jar openapi-generator-cli-7.9.0.jar generate -i ../../selling-partner-api-models/models/listings-restrictions-api-model/listingsRestrictions_2021-08-01.json -g csharp -t config/templates -o sdk -c config/config.json --additional-properties=modelPackage=Mode/listing/restriction/v2021_08_01,apiPackage=Ap/listing/restriction/v2021_08_01  && \
          java -jar openapi-generator-cli-7.9.0.jar generate -i ../../selling-partner-api-models/models/merchant-fulfillment-api-model/merchantFulfillmentV0.json -g csharp -t config/templates -o sdk -c config/config.json --additional-properties=modelPackage=Mode/merchantFulfillmen/v0,apiPackage=Ap/merchantFulfillmen/v0 && \
          java -jar openapi-generator-cli-7.9.0.jar generate -i ../../selling-partner-api-models/models/messaging-api-model/messaging.json -g csharp -t config/templates -o sdk -c config/config.json --additional-properties=modelPackage=Mode/messagin/v1,apiPackage=Ap/messagin/v1 && \
          java -jar openapi-generator-cli-7.9.0.jar generate -i ../../selling-partner-api-models/models/notifications-api-model/notifications.json -g csharp -t config/templates -o sdk -c config/config.json --additional-properties=modelPackage=Mode/notification/v1,apiPackage=Ap/notification/v1 && \
          java -jar openapi-generator-cli-7.9.0.jar generate -i ../../selling-partner-api-models/models/orders-api-model/ordersV0.json -g csharp -t config/templates -o sdk -c config/config.json --additional-properties=modelPackage=Mode/order/v0,apiPackage=Ap/order/v0 && \
          java -jar openapi-generator-cli-7.9.0.jar generate -i ../../selling-partner-api-models/models/product-fees-api-model/productFeesV0.json -g csharp -t config/templates -o sdk -c config/config.json --additional-properties=modelPackage=Mode/productFee/v0,apiPackage=Ap/productFee/v0 && \
          java -jar openapi-generator-cli-7.9.0.jar generate -i ../../selling-partner-api-models/models/product-pricing-api-model/productPricingV0.json -g csharp -t config/templates -o sdk -c config/config.json --additional-properties=modelPackage=Mode/pricin/v0,apiPackage=Ap/pricin/v0 && \
          java -jar openapi-generator-cli-7.9.0.jar generate -i ../../selling-partner-api-models/models/product-pricing-api-model/productPricing_2022-05-01.json -g csharp -t config/templates -o sdk -c config/config.json --additional-properties=modelPackage=Mode/pricin/v2022_05_01,apiPackage=Ap/pricin/v2022_05_01 && \
          java -jar openapi-generator-cli-7.9.0.jar generate -i ../../selling-partner-api-models/models/product-type-definitions-api-model/definitionsProductTypes_2020-09-01.json -g csharp -t config/templates -o sdk -c config/config.json --additional-properties=modelPackage=Mode/productTypeDefinition/v2020_09_01,apiPackage=Ap/productTypeDefinition/v2020_09_01 && \
          java -jar openapi-generator-cli-7.9.0.jar generate -i ../../selling-partner-api-models/models/replenishment-api-model/replenishment-2022-11-07.json -g csharp -t config/templates -o sdk -c config/config.json --additional-properties=modelPackage=Mode/replenishmen/v2022_11_07,apiPackage=Ap/replenishmen/v2022_11_07 && \
          java -jar openapi-generator-cli-7.9.0.jar generate -i ../../selling-partner-api-models/models/reports-api-model/reports_2021-06-30.json -g csharp -t config/templates -o sdk -c config/config.json --additional-properties=modelPackage=Mode/report/v2021_06_30,apiPackage=Ap/report/v2021_06_30 && \
          java -jar openapi-generator-cli-7.9.0.jar generate -i ../../selling-partner-api-models/models/sales-api-model/sales.json -g csharp -t config/templates -o sdk -c config/config.json --additional-properties=modelPackage=Mode/sale/v1,apiPackage=Ap/sale/v1 && \
          java -jar openapi-generator-cli-7.9.0.jar generate -i ../../selling-partner-api-models/models/sellers-api-model/sellers.json -g csharp -t config/templates -o sdk -c config/config.json --additional-properties=modelPackage=Mode/seller/v1,apiPackage=Ap/seller/v1 && \
          java -jar openapi-generator-cli-7.9.0.jar generate -i ../../selling-partner-api-models/models/services-api-model/services.json -g csharp -t config/templates -o sdk -c config/config.json --additional-properties=modelPackage=Mode/service/v1,apiPackage=Ap/service/v1 && \
          java -jar openapi-generator-cli-7.9.0.jar generate -i ../../selling-partner-api-models/models/shipment-invoicing-api-model/shipmentInvoicingV0.json -g csharp -t config/templates -o sdk -c config/config.json --additional-properties=modelPackage=Mode/invoicin/v0,apiPackage=Ap/invoicin/v0 && \
          java -jar openapi-generator-cli-7.9.0.jar generate -i ../../selling-partner-api-models/models/shipping-api-model/shippingV2.json -g csharp -t config/templates -o sdk -c config/config.json --additional-properties=modelPackage=Mode/shippin/v2,apiPackage=Ap/shippin/v2 --skip-validate-spec && \
          java -jar openapi-generator-cli-7.9.0.jar generate -i ../../selling-partner-api-models/models/solicitations-api-model/solicitations.json -g csharp -t config/templates -o sdk -c config/config.json --additional-properties=modelPackage=Mode/solicitation/v1,apiPackage=Ap/solicitation/v1 && \
          java -jar openapi-generator-cli-7.9.0.jar generate -i ../../selling-partner-api-models/models/supply-sources-api-model/supplySources_2020-07-01.json -g csharp -t config/templates -o sdk -c config/config.json --additional-properties=modelPackage=Mode/supplySource/v2020_07_01,apiPackage=Ap/supplySource/v2020_07_01 && \
          java -jar openapi-generator-cli-7.9.0.jar generate -i ../../selling-partner-api-models/models/tokens-api-model/tokens_2021-03-01.json -g csharp -t config/templates -o sdk -c config/config.json --additional-properties=modelPackage=Mode/token/v2021_03_01,apiPackage=Ap/token/v2021_03_01 && \
          java -jar openapi-generator-cli-7.9.0.jar generate -i ../../selling-partner-api-models/models/uploads-api-model/uploads_2020-11-01.json -g csharp -t config/templates -o sdk -c config/config.json --additional-properties=modelPackage=Mode/upload/v2020_11_01,apiPackage=Ap/upload/v2020_11_01 && \
          java -jar openapi-generator-cli-7.9.0.jar generate -i ../../selling-partner-api-models/models/vendor-direct-fulfillment-inventory-api-model/vendorDirectFulfillmentInventoryV1.json -g csharp -t config/templates -o sdk -c config/config.json --additional-properties=modelPackage=Mode/vendo/d/inventor/v1,apiPackage=Ap/vendo/d/inventor/v1 && \
          java -jar openapi-generator-cli-7.9.0.jar generate -i ../../selling-partner-api-models/models/vendor-direct-fulfillment-orders-api-model/vendorDirectFulfillmentOrders_2021-12-28.json -g csharp -t config/templates -o sdk -c config/config.json --additional-properties=modelPackage=Mode/vendo/d/order/v2021_12_28,apiPackage=Ap/vendo/d/order/v2021_12_28 && \
          java -jar openapi-generator-cli-7.9.0.jar generate -i ../../selling-partner-api-models/models/vendor-direct-fulfillment-payments-api-model/vendorDirectFulfillmentPaymentsV1.json -g csharp -t config/templates -o sdk -c config/config.json --additional-properties=modelPackage=Mode/vendo/d/payment/v1,apiPackage=Ap/vendo/d/payment/v1 && \
          java -jar openapi-generator-cli-7.9.0.jar generate -i ../../selling-partner-api-models/models/vendor-direct-fulfillment-shipping-api-model/vendorDirectFulfillmentShipping_2021-12-28.json -g csharp -t config/templates -o sdk -c config/config.json --additional-properties=modelPackage=Mode/vendo/d/shippin/v2021_12_28,apiPackage=Ap/vendo/d/shippin/v2021_12_28 && \
          java -jar openapi-generator-cli-7.9.0.jar generate -i ../../selling-partner-api-models/models/vendor-direct-fulfillment-transactions-api-model/vendorDirectFulfillmentTransactions_2021-12-28.json -g csharp -t config/templates -o sdk -c config/config.json --additional-properties=modelPackage=Mode/vendo/d/transaction/v2021_12_28,apiPackage=Ap/vendo/d/transaction/v2021_12_28 && \
          java -jar openapi-generator-cli-7.9.0.jar generate -i ../../selling-partner-api-models/models/vendor-invoices-api-model/vendorInvoices.json -g csharp -t config/templates -o sdk -c config/config.json --additional-properties=modelPackage=Mode/vendo/invoice/v1,apiPackage=Ap/vendo/invoice/v1 --skip-validate-spec && \
          java -jar openapi-generator-cli-7.9.0.jar generate -i ../../selling-partner-api-models/models/vendor-orders-api-model/vendorOrders.json -g csharp -t config/templates -o sdk -c config/config.json --additional-properties=modelPackage=Mode/vendo/order/v1,apiPackage=Ap/vendo/order/v1 && \
          java -jar openapi-generator-cli-7.9.0.jar generate -i ../../selling-partner-api-models/models/vendor-shipments-api-model/vendorShipments.json -g csharp -t config/templates -o sdk -c config/config.json --additional-properties=modelPackage=Mode/vendo/shipment/v1,apiPackage=Ap/vendo/shipment/v1 && \
          java -jar openapi-generator-cli-7.9.0.jar generate -i ../../selling-partner-api-models/models/vendor-transaction-status-api-model/vendorTransactionStatus.json -g csharp -t config/templates -o sdk -c config/config.json --additional-properties=modelPackage=Mode/vendo/transactionStatu/v1,apiPackage=Ap/vendo/transactionStatu/v1 && \
          java -jar openapi-generator-cli-7.9.0.jar generate -i ../../selling-partner-api-models/models/vehicles-api-model/vehicles_2024-11-01.json -g csharp -t config/templates -o sdk -c config/config.json --additional-properties=modelPackage=Mode/vehicle/v2024_11_01,apiPackage=Ap/vehicle/v2024_11_01
      - name: Restore dependencies
        working-directory: ./selling-partner-api-sdk-jc-csharp/csharp
        run: dotnet restore
      - name: Build SDK and generate artifact
        working-directory: ./selling-partner-api-sdk-jc-csharp/csharp
        run: |
            dotnet build --configuration Release
            dotnet pack --configuration Release --output nupkg
      - name: Create PR
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: Update Csharp SDK
          title: 'Update Csharp SDK'
          body: |
            Update Csharp SDK with latest changes from upstream.
          branch: feature/update-csharp-sdk
          delete-branch: true  # Overwrite if branch exists
          assignees: xujiache
          path: ./selling-partner-api-sdk-jc-csharp
        #   token: ${{ secrets.MAFGE_PAT }}
